name: Update RAP guidance

on:
  workflow_dispatch:
  schedule:
    # Hourly. GitHub schedules are approximate, not exact.
    - cron: "35 * * * *"

permissions:
  contents: write

jobs:
  update-guidance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev libgeos-dev proj-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate latest RAP guidance
        run: |
          python scripts/run_guidance.py --output-dir web/data --asset-dir web/assets

      - name: Commit updated web data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RAP guidance web data"
          file_pattern: "web/data/*.json web/data/*.geojson web/assets/*.png"

name: Update RAP guidance

on:
  workflow_dispatch:
  schedule:
    # Hourly. GitHub schedules are approximate, not exact.
    - cron: "35 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-guidance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev libgeos-dev proj-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate latest RAP guidance
        run: |
          PYTHONPATH=. python scripts/run_guidance.py \
            --output-dir web/data \
            --asset-dir web/assets \
            --fail-on-error

      - name: Commit updated web data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RAP guidance web data"
          file_pattern: "web/data web/assets"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Update RAP guidance

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mbcp_guidance/**"
      - "scripts/**"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/update_guidance.yml"
  schedule:
    # Hourly. GitHub schedules are approximate, not exact.
    - cron: "35 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-guidance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out latest main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev libgeos-dev proj-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate latest RAP guidance
        id: guidance
        continue-on-error: true
        run: |
          PYTHONPATH=. python scripts/run_guidance.py \
            --output-dir web/data \
            --asset-dir web/assets \
            --fail-on-error

      - name: Upload RAP error log
        if: steps.guidance.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rap-guidance-error
          path: web/data/guidance_error.txt
          if-no-files-found: warn
          retention-days: 7

      # Deploy directly from the generated workspace. A repository push is not
      # required for GitHub Pages to receive the newest RAP guidance.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Keep generated files in the repository when possible, but never allow a
      # push/rebase issue to block the already completed Pages deployment.
      - name: Optionally commit updated web data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A web/data web/assets

          if git diff --cached --quiet; then
            echo "No web-data changes to commit."
            exit 0
          fi

          git commit -m "Update RAP guidance web data"
          git fetch origin main

          if ! git rebase -X theirs origin/main; then
            echo "Could not rebase generated output onto the newest main branch; Pages was already deployed."
            git rebase --abort || true
            exit 0
          fi

          if ! git push origin HEAD:main; then
            echo "Could not push generated output to main; Pages was already deployed."
            exit 0
          fi

      - name: Mark failed guidance generation
        if: steps.guidance.outcome == 'failure'
        run: |
          echo "RAP guidance generation failed. See the rap-guidance-error artifact and web/data/guidance_error.txt."
          exit 1
